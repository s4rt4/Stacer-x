name: Build Stacer Application

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-all:
    name: Build All
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, ubuntu-22.04, ubuntu-22.04-arm]
        include:
          - os: ubuntu-24.04
            codename: noble
            # qt_version: 6.8
            # qt_arch: gcc_64
          - os: ubuntu-24.04-arm
            codename: noble-arm
            # qt_version: 6.8
            # qt_arch: linux_gcc_arm64
          - os: ubuntu-22.04
            codename: jammy
            # qt_version: 6.8
            # qt_arch: gcc_64
          - os: ubuntu-22.04-arm
            codename: jammy-arm
            # qt_version: 6.8
            # qt_arch: linux_gcc_arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update package repositories
        run: sudo apt-get update

      # - name: Install Qt
      #   uses: jurplel/install-qt-action@v4
      #   with:
      #     version: ${{ matrix.qt_version }}
      #     target: desktop
      #     arch: ${{ matrix.qt_arch }}
      #     modules: qtcharts

      - name: Install libraries
        run: |
          sudo apt-get install -y qt6-base-dev qt6-tools-dev qt6-tools-dev-tools qt6-l10n-tools libqt6charts6-dev libqt6svg6-dev qt6-wayland-dev libglx-dev libgl1-mesa-dev libxkbcommon-dev libvulkan-dev
          sudo apt-get install -y libfuse2

      - name: Install build tools
        run: |
          sudo apt-get install -y cmake dh-make devscripts build-essential lintian

      - name: Build and make release
        run: |
          bash ${{ github.workspace }}/release.sh

      - name: Upload tarball
        uses: actions/upload-artifact@v7
        if: matrix.codename == 'jammy'
        with:
          name: stacer-tarball
          path: ${{ github.workspace }}/release/stacer-*.tar.gz

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: stacer-${{ matrix.codename }}
          path: |
            ${{ github.workspace }}/release/stacer_*.deb
            ${{ github.workspace }}/release/stacer-*.rpm
            ${{ github.workspace }}/release/Stacer-*.AppImage

  build-flatpak:
    name: Build Flatpak
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Mark repo as safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Get last tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD")
          echo "last_tag=$LAST_TAG" >> $GITHUB_ENV

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: fr.quentium.stacer_${{ env.last_tag }}-${{ matrix.arch }}.flatpak
          manifest-path: flatpak/fr.quentium.stacer.yml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.arch }}

  publish:
    name: Publish Release
    needs: [build-all, build-flatpak]
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get changelog
        id: changelog
        run: |
          CHANGELOG=$(awk '/^stacer \(/ {if (NR!=1) exit} /^[ ]*\*/ {print}' ${{ github.workspace }}/debian/changelog)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          printf "%s\n" "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: previous_tag
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1)
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Download tarball
        uses: actions/download-artifact@v8
        with:
          pattern: stacer-tarball
          path: ${{ github.workspace }}/release/
          merge-multiple: true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: stacer-jammy*
          path: ${{ github.workspace }}/release/
          merge-multiple: true

      - name: Download Flatpak artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: fr.quentium.stacer_*.flatpak
          path: ${{ github.workspace }}/release/
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Fix and features:

            ${{ steps.changelog.outputs.changelog }}

            NOTE: I'm now publishing GitHub Actions builds in every release, all previous self compiled binaries are now removed. deb, rpm and AppImage files are from the oldest supported Ubuntu version (currently jammy).

            **Full Changelog**: https://github.com/QuentiumYT/Stacer/compare/${{ steps.previous_tag.outputs.previous_tag }}...${{ github.ref_name }}
          files: |
            ${{ github.workspace }}/release/stacer_*.deb
            ${{ github.workspace }}/release/stacer-*.rpm
            ${{ github.workspace }}/release/Stacer-*.AppImage
            ${{ github.workspace }}/release/fr.quentium.stacer_*.flatpak

      - name: Publish PPA package
        uses: yuezk/publish-ppa-package@main
        with:
          tarball: ${{ github.workspace }}/release/stacer-*.tar.gz
          debian_dir: ${{ github.workspace }}/debian/
          repository: "quentiumyt/stacer"
          deb_email: "pro@quentium.fr"
          deb_fullname: "Quentin Lienhardt"
          gpg_private_key: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          gpg_passphrase: ${{ secrets.PPA_GPG_PASSPHRASE }}
          series: "noble jammy"
          new_version_template: "{VERSION}-{REVISION}+{SERIES}"
          keep_changelog: true
